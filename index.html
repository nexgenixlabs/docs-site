<body>

  <!-- Header -->

      <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
        <span></span><span></span><span></span>

      <a href="#/introduction" class="logo-link">
        <img src="assets/auditgraph-logo.png" alt="AuditGraph" class="logo-img">

        <span class="logo-divider">|</span>
        <span class="logo-sub">Docs</span>

    </div>
    <div class="header-right">

      </div>
      <a href="https://app.auditgraph.ai" class="launch-btn" target="_blank" rel="noopener">

        <div class="skeleton-line w60"></div>

        <div class="skeleton-line w100"></div>
        <div class="skeleton-line w50"></div>

      <article class="article" id="article"></article>

      <ul class="toc-list" id="toc-list"></ul>
